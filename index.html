<!DOCTYPE html>
<html>
<head>
<title>Special Surprise</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(135deg,#ff9a9e,#fad0c4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 30px rgba(0,0,0,0.2);
max-width:400px;
}

button{
padding:15px 30px;
font-size:18px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
}

h1{
color:#ff2e63;
}

</style>

</head>

<body>

<div class="card" id="page1">
<h2>🎁 Want to see what Patel Jatin sent you?</h2>
<br>
<button onclick="openGift()">YES</button>
</div>

<div class="card" id="page2" style="display:none;">
<h1>🎉 Happy Birthday My Friend! 🎂</h1>
<p>Wishing you happiness, success, and lots of fun!</p>
<p>– From Patel Jatin 💙</p>
</div>

<script>

function openGift(){
document.getElementById("page1").style.display="none";
document.getElementById("page2").style.display="block";
}

</script>

</body>
</html>
